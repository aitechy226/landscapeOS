
services:
  # Local Postgres (mirrors Supabase in dev — use Supabase in production)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: landscapeos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI backend
  api:
    build: ./backend
    environment:
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    dns:
      - 192.168.86.1
      - 8.8.8.8
      - 8.8.4.4
    dns_search:
      - .
    dns_opt:
      - ndots:1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "echo 'nameserver 192.168.86.1' > /etc/resolv.conf &&
             echo 'nameserver 8.8.8.8' >> /etc/resolv.conf &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
  # Frontend (static file server)
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data:
