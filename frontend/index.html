// ─── Clients Page (with Client Detail, New Quote Modal, Quote Review) ─────────
function ClientsPage() {
  const api = useApi();
  const [clients, setClients] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ first_name:'', last_name:'', email:'', phone:'', property_type:'residential', address:'', city:'', state:'', zip_code:'', property_sqft:'' });
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');

  // Client detail + quotes flow
  const [selectedClient, setSelectedClient] = useState(null);
  const [quotesForClient, setQuotesForClient] = useState([]);
  const [loadingQuotes, setLoadingQuotes] = useState(false);
  const [quotesLoadError, setQuotesLoadError] = useState('');
  const [showNewQuoteModal, setShowNewQuoteModal] = useState(false);
  const [editingQuote, setEditingQuote] = useState(null);
  // New quote form
  const [newQuoteDesc, setNewQuoteDesc] = useState('');
  const [newQuoteSqft, setNewQuoteSqft] = useState('');
  const [generatingQuote, setGeneratingQuote] = useState(false);
  const [quoteError, setQuoteError] = useState('');
  // Quote review edits (local copy of line items for PATCH)
  const [editLineItems, setEditLineItems] = useState([]);
  const [savingQuote, setSavingQuote] = useState(false);
  const [sendingQuote, setSendingQuote] = useState(false);
  const [deletingQuote, setDeletingQuote] = useState(false);
  const [regeneratingQuote, setRegeneratingQuote] = useState(false);

  useEffect(() => {
    api('/clients?page_size=50').then(d => { setClients(d.items || []); setLoading(false); }).catch(() => setLoading(false));
  }, []);

  useEffect(() => {
    if (!selectedClient || selectedClient.id == null) { setQuotesForClient([]); setQuotesLoadError(''); return; }
    setLoadingQuotes(true);
    setQuotesLoadError('');
    api('/quotes?client_id=' + encodeURIComponent(selectedClient.id) + '&page_size=50')
      .then(d => { setQuotesForClient(Array.isArray(d.items) ? d.items : []); setQuotesLoadError(''); setLoadingQuotes(false); })
      .catch(() => { setQuotesLoadError('Could not load quotes. You can still create a new quote.'); setLoadingQuotes(false); });
  }, [selectedClient?.id]);

  const openQuoteReview = (quote) => {
    if (!quote || !quote.id) return;
    setEditingQuote(quote);
    setQuoteError('');
    const items = Array.isArray(quote.ai_line_items) ? quote.ai_line_items : [];
    setEditLineItems(items.map(i => ({
      description: String(i.description != null ? i.description : '').slice(0, VALID.lineItemDescMax),
      quantity: Math.min(VALID.lineItemQtyMax, Math.max(0, Number(i.quantity) || 0)),
      unit: String(i.unit != null ? i.unit : 'each').slice(0, 50),
      unit_price: Math.min(VALID.lineItemPriceMax, Math.max(0, Number(i.unit_price) || 0)),
      total: Math.round((Number(i.quantity) || 0) * (Number(i.unit_price) || 0) * 100) / 100,
    })));
  };

  const validateClient = () => {
    const fn = (form.first_name || '').trim();
    const ln = (form.last_name || '').trim();
    if (!fn) { setError('First name is required (1–100 characters).'); return false; }
    if (!ln) { setError('Last name is required (1–100 characters).'); return false; }
    if (fn.length > VALID.nameMax) { setError(`First name must be at most ${VALID.nameMax} characters.`); return false; }
    if (ln.length > VALID.nameMax) { setError(`Last name must be at most ${VALID.nameMax} characters.`); return false; }
    const emailRes = validateEmail(form.email, false);
    if (!emailRes.ok) { setError(emailRes.msg); return false; }
    const phone = (form.phone || '').trim();
    if (phone) {
      const p = validatePhone(phone);
      if (!p.ok) { setError(p.msg); return false; }
    }
    const sqft = form.property_sqft;
    if (sqft !== '' && sqft != null) {
      const n = parseInt(sqft, 10);
      if (isNaN(n) || n < 1 || n > 999999) { setError('Property sq ft must be 1–999,999, or leave blank.'); return false; }
    }
    return true;
  };

  const handleAdd = async () => {
    setError('');
    if (!validateClient()) return;
    const payload = {
      first_name: (form.first_name || '').trim(),
      last_name: (form.last_name || '').trim(),
      email: (form.email || '').trim() || undefined,
      phone: (form.phone || '').trim() || undefined,
      property_type: form.property_type || 'residential',
      address: (form.address || '').trim() || undefined,
      city: (form.city || '').trim() || undefined,
      state: (form.state || '').trim() || undefined,
      zip_code: (form.zip_code || '').trim() || undefined,
      property_sqft: form.property_sqft === '' || form.property_sqft == null ? undefined : parseInt(form.property_sqft, 10),
    };
    if (payload.property_sqft !== undefined && (isNaN(payload.property_sqft) || payload.property_sqft < 1)) delete payload.property_sqft;
    setSaving(true);
    try {
      const client = await api('/clients', { method: 'POST', body: payload });
      setClients(cs => [client, ...cs]);
      setShowAdd(false);
      setError('');
      setForm({ first_name:'', last_name:'', email:'', phone:'', property_type:'residential', address:'', city:'', state:'', zip_code:'', property_sqft:'' });
    } catch (e) {
      setError(e.message || 'Could not add client. Please try again.');
    }
    setSaving(false);
  };

  const filtered = clients.filter(c =>
    !search || `${c.first_name} ${c.last_name} ${c.email || ''} ${c.phone || ''}`.toLowerCase().includes(search.toLowerCase())
  );

  const handleNewQuoteGenerate = async () => {
    setQuoteError('');
    const desc = (newQuoteDesc || '').trim();
    if (desc.length < VALID.quoteDescMin) {
      setQuoteError(`Job description must be at least ${VALID.quoteDescMin} characters.`);
      return;
    }
    if (desc.length > VALID.quoteDescMax) {
      setQuoteError(`Job description must be at most ${VALID.quoteDescMax} characters.`);
      return;
    }
    let sqft = undefined;
    if (newQuoteSqft !== '' && newQuoteSqft != null) {
      const n = parseInt(String(newQuoteSqft).trim(), 10);
      if (isNaN(n) || n < 0) {
        setQuoteError('Property sq ft must be 0 or a positive number.');
        return;
      }
      if (n > VALID.propertySqftMax) {
        setQuoteError(`Property sq ft must be at most ${VALID.propertySqftMax.toLocaleString()}.`);
        return;
      }
      sqft = n;
    }
    if (!selectedClient || !selectedClient.id) {
      setQuoteError('Please go back and select a client again.');
      return;
    }
    setGeneratingQuote(true);
    let created = null;
    try {
      created = await api('/quotes', { method: 'POST', body: { client_id: selectedClient.id, job_description: desc, property_sqft: sqft } });
      if (!created || !created.id) {
        setQuoteError('Quote was created but the response was invalid. Please refresh and try again.');
        return;
      }
      const withAi = await api('/quotes/' + created.id + '/generate', { method: 'POST', body: { job_description: desc, property_sqft: sqft } });
      if (!withAi || !Array.isArray(withAi.ai_line_items) || !withAi.ai_line_items.length) {
        setQuoteError('AI did not return any line items. You can delete this draft or try Regenerate with AI in the quote view.');
        setQuotesForClient(q => [created, ...(Array.isArray(q) ? q : [])]);
        setShowNewQuoteModal(false);
        setNewQuoteDesc('');
        setNewQuoteSqft('');
        openQuoteReview(created);
        return;
      }
      setQuotesForClient(q => [withAi, ...(Array.isArray(q) ? q : [])]);
      setShowNewQuoteModal(false);
      setNewQuoteDesc('');
      setNewQuoteSqft('');
      openQuoteReview(withAi);
    } catch (e) {
      const msg = e && e.message ? e.message : (e && e.detail && e.detail.message ? e.detail.message : 'Could not create or generate quote. Please try again.');
      setQuoteError(msg);
      if (created && created.id) {
        setQuotesForClient(q => [created, ...(Array.isArray(q) ? q : [])]);
        setShowNewQuoteModal(false);
        setNewQuoteDesc('');
        setNewQuoteSqft('');
        openQuoteReview(created);
      }
    } finally {
      setGeneratingQuote(false);
    }
  };

  const handleRegenerateQuote = async () => {
    if (!editingQuote || editingQuote.status !== 'draft') return;
    const desc = (editingQuote.description || '').trim();
    if (desc.length < VALID.quoteDescMin) {
      setQuoteError('Quote has no job description. Add a description or delete this draft and create a new quote from the client.');
      return;
    }
    setQuoteError('');
    setRegeneratingQuote(true);
    try {
      const sqft = editingQuote.property_sqft != null && editingQuote.property_sqft !== '' ? Number(editingQuote.property_sqft) : undefined;
      const updated = await api('/quotes/' + editingQuote.id + '/generate', { method: 'POST', body: { job_description: desc, property_sqft: sqft } });
      if (updated && Array.isArray(updated.ai_line_items) && updated.ai_line_items.length) {
        setEditingQuote(updated);
        setEditLineItems((updated.ai_line_items || []).map(i => ({
          description: String(i.description != null ? i.description : '').slice(0, VALID.lineItemDescMax),
          quantity: Math.min(VALID.lineItemQtyMax, Math.max(0, Number(i.quantity) || 0)),
          unit: String(i.unit != null ? i.unit : 'each').slice(0, 50),
          unit_price: Math.min(VALID.lineItemPriceMax, Math.max(0, Number(i.unit_price) || 0)),
          total: Math.round((Number(i.quantity) || 0) * (Number(i.unit_price) || 0) * 100) / 100,
        })));
        setQuotesForClient(prev => (Array.isArray(prev) ? prev : []).map(q => q.id === updated.id ? updated : q));
      } else {
        setQuoteError('AI did not return any line items. The service may be busy. Please try again.');
      }
    } catch (e) {
      setQuoteError(e && e.message ? e.message : (e && e.detail && e.detail.message ? e.detail.message : 'Regeneration failed. Please try again.'));
    } finally {
      setRegeneratingQuote(false);
    }
  };

  const handleSaveQuote = async () => {
    if (!editingQuote || editingQuote.status !== 'draft') return;
    if (!editLineItems.length) {
      setQuoteError('No line items to save. Generate with AI first or delete this draft.');
      return;
    }
    const trimmed = editLineItems.map(i => ({
      description: String(i.description != null ? i.description : '').trim().slice(0, VALID.lineItemDescMax),
      quantity: Math.min(VALID.lineItemQtyMax, Math.max(0, Number(i.quantity) || 0)),
      unit: String(i.unit != null ? i.unit : 'each').slice(0, 50),
      unit_price: Math.min(VALID.lineItemPriceMax, Math.max(0, Number(i.unit_price) || 0)),
    })).map(i => ({ ...i, total: Math.round(i.quantity * i.unit_price * 100) / 100 }));
    const emptyDesc = trimmed.findIndex(i => !i.description);
    if (emptyDesc >= 0) {
      setQuoteError('Every line item needs a description. Please add or remove empty rows.');
      return;
    }
    if (trimmed.length > VALID.lineItemsMax) {
      setQuoteError(`You can have at most ${VALID.lineItemsMax} line items.`);
      return;
    }
    setQuoteError('');
    setSavingQuote(true);
    try {
      const updated = await api('/quotes/' + editingQuote.id, {
        method: 'PATCH',
        body: { line_items: trimmed },
      });
      setEditingQuote(updated);
      setEditLineItems(Array.isArray(updated.ai_line_items) ? updated.ai_line_items.map(i => ({ ...i })) : []);
    } catch (e) {
      setQuoteError(e && e.message ? e.message : (e && e.detail && e.detail.message ? e.detail.message : 'Could not save quote. Please try again.'));
    } finally {
      setSavingQuote(false);
    }
  };

  const handleApproveQuote = async () => {
    if (!editingQuote || editingQuote.status !== 'draft') return;
    if (!editLineItems.length) {
      setQuoteError('Add at least one line item before approving.');
      return;
    }
    setQuoteError('');
    setSavingQuote(true);
    try {
      const updated = await api('/quotes/' + editingQuote.id + '/approve', { method: 'POST' });
      setEditingQuote(updated);
    } catch (e) {
      setQuoteError(e && e.message ? e.message : (e && e.detail && e.detail.message ? e.detail.message : 'Could not approve quote. Please try again.'));
    } finally {
      setSavingQuote(false);
    }
  };

  const handleSendQuote = async (method) => {
    if (!editingQuote) return;
    setQuoteError('');
    setSendingQuote(true);
    try {
      await api('/quotes/' + editingQuote.id + '/send', { method: 'POST', body: { method, message: '' } });
      const updated = await api('/quotes/' + editingQuote.id);
      setEditingQuote(updated);
    } catch (e) {
      setQuoteError(e && e.message ? e.message : (e && e.detail && e.detail.message ? e.detail.message : 'Could not send quote. Please try again.'));
    } finally {
      setSendingQuote(false);
    }
  };

  const handleDeleteQuote = async () => {
    if (!editingQuote || editingQuote.status !== 'draft') return;
    if (!window.confirm('Delete this draft quote? This cannot be undone.')) return;
    const quoteId = editingQuote.id;
    if (!quoteId) {
      setQuoteError('Cannot delete: quote ID missing.');
      return;
    }
    setQuoteError('');
    setDeletingQuote(true);
    try {
      await api('/quotes/delete', { method: 'POST', body: { quote_id: String(quoteId) } });
      setQuotesForClient(prev => (prev || []).filter(q => q.id !== quoteId));
      setEditingQuote(null);
      setEditLineItems([]);
    } catch (e) {
      setQuoteError(e && e.message ? e.message : (e && e.detail && e.detail.message ? e.detail.message : 'Could not delete quote. Please try again.'));
    } finally {
      setDeletingQuote(false);
    }
  };

  // ─── Quote Review Screen ───────────────────────────────────────────────────
  if (editingQuote) {
    const subtotal = editLineItems.reduce((s, i) => s + (Number(i.total) || 0), 0);
    const tax = Number(editingQuote.tax_amount) || 0;
    const discount = Number(editingQuote.discount_amount) || 0;
    const total = Math.round((subtotal + tax - discount) * 100) / 100;
    const isDraft = editingQuote.status === 'draft';
    const hasNoLineItems = !editLineItems.length;

    return (
      <div>
        <div style={{ marginBottom: '16px', display: 'flex', alignItems: 'center', gap: '12px' }}>
          <button className="btn btn-ghost" onClick={() => { setEditingQuote(null); setQuoteError(''); }}>← Back</button>
          <span className="font-semibold">Quote {editingQuote.quote_number}</span>
          <Badge status={editingQuote.status} />
        </div>
        {quoteError && <Alert type="error">{quoteError}</Alert>}
        {hasNoLineItems && isDraft && (
          <Alert type="warning" style={{ marginBottom: '16px' }}>
            This quote has no line items. AI generation may have failed or timed out. Use <strong>Regenerate with AI</strong> to try again, or <strong>Delete</strong> this draft.
          </Alert>
        )}
        <div className="card">
          <div className="card-header">
            <div className="card-title">Line items</div>
            {isDraft && (
              <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                {hasNoLineItems ? (
                  <>
                    <button className="btn btn-primary btn-sm" onClick={handleRegenerateQuote} disabled={regeneratingQuote || deletingQuote} title="Retry AI generation">{regeneratingQuote ? <Spinner /> : 'Regenerate with AI'}</button>
                    <button className="btn btn-ghost btn-sm" style={{ color: 'var(--error)' }} onClick={handleDeleteQuote} disabled={deletingQuote || regeneratingQuote} title="Delete this draft quote">{deletingQuote ? <Spinner /> : 'Delete'}</button>
                  </>
                ) : (
                  <>
                    <button className="btn btn-secondary btn-sm" onClick={handleSaveQuote} disabled={savingQuote || deletingQuote}>{savingQuote ? <Spinner /> : 'Save'}</button>
                    <button className="btn btn-primary btn-sm" onClick={handleApproveQuote} disabled={savingQuote || deletingQuote}>{savingQuote ? <Spinner /> : 'Approve'}</button>
                    <button className="btn btn-primary btn-sm" onClick={() => handleSendQuote('email')} disabled={sendingQuote || deletingQuote}>{sendingQuote ? <Spinner /> : 'Send by email'}</button>
                    <button className="btn btn-ghost btn-sm" onClick={() => handleSendQuote('download')} disabled={sendingQuote || deletingQuote}>Download PDF</button>
                    <button className="btn btn-ghost btn-sm" style={{ color: 'var(--error)', marginLeft: 'auto' }} onClick={handleDeleteQuote} disabled={savingQuote || sendingQuote || deletingQuote} title="Delete this draft quote">{deletingQuote ? <Spinner /> : 'Delete'}</button>
                  </>
                )}
              </div>
            )}
          </div>
          <div className="table-container">
            <table>
              <thead>
                <tr><th>Description</th><th>Qty</th><th>Unit</th><th>Unit price</th><th>Total</th></tr>
              </thead>
              <tbody>
                {editLineItems.map((item, idx) => (
                  <tr key={idx}>
                    <td><input className="form-input" style={{ minWidth: '180px' }} maxLength={VALID.lineItemDescMax} value={item.description || ''} onChange={e => { const n = [...editLineItems]; n[idx] = { ...n[idx], description: e.target.value.slice(0, VALID.lineItemDescMax) }; n[idx].total = Math.round((Number(n[idx].quantity) || 0) * (Number(n[idx].unit_price) || 0) * 100) / 100; setEditLineItems(n); }} /></td>
                    <td><input className="form-input" type="number" style={{ width: '70px' }} min={0} max={VALID.lineItemQtyMax} value={item.quantity ?? ''} onChange={e => { const v = parseFloat(e.target.value); const q = isNaN(v) ? 0 : Math.min(VALID.lineItemQtyMax, Math.max(0, v)); const n = [...editLineItems]; n[idx] = { ...n[idx], quantity: q, total: Math.round(q * (Number(n[idx].unit_price) || 0) * 100) / 100 }; setEditLineItems(n); }} /></td>
                    <td><input className="form-input" style={{ width: '80px' }} maxLength={50} value={item.unit || ''} onChange={e => { const n = [...editLineItems]; n[idx] = { ...n[idx], unit: e.target.value.slice(0, 50) }; setEditLineItems(n); }} /></td>
                    <td><input className="form-input" type="number" style={{ width: '90px' }} min={0} max={VALID.lineItemPriceMax} step="0.01" value={item.unit_price ?? ''} onChange={e => { const v = parseFloat(e.target.value); const p = isNaN(v) ? 0 : Math.min(VALID.lineItemPriceMax, Math.max(0, v)); const n = [...editLineItems]; n[idx] = { ...n[idx], unit_price: p, total: Math.round((Number(n[idx].quantity) || 0) * p * 100) / 100 }; setEditLineItems(n); }} /></td>
                    <td style={{ fontWeight: 600 }}>${(Number(item.total) || 0).toFixed(2)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{ marginTop: '16px', textAlign: 'right', borderTop: '1px solid var(--earth-300)', paddingTop: '16px' }}>
            <div className="text-sm text-muted">Subtotal: ${subtotal.toFixed(2)} · Tax: ${tax.toFixed(2)} · Discount: ${discount.toFixed(2)}</div>
            <div className="font-semibold" style={{ fontSize: '18px', marginTop: '4px' }}>Total: ${total.toFixed(2)}</div>
          </div>
        </div>
      </div>
    );
  }

  // ─── Client Detail View ────────────────────────────────────────────────────
  if (selectedClient) {
    const client = selectedClient;
    return (
      <div>
        <div style={{ marginBottom: '16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <button className="btn btn-ghost" onClick={() => setSelectedClient(null)}>← Back to clients</button>
          <button className="btn btn-primary" onClick={() => { setShowNewQuoteModal(true); setNewQuoteDesc(''); setNewQuoteSqft(''); setQuoteError(''); }}>+ New Quote</button>
        </div>
        <div className="card" style={{ marginBottom: '20px' }}>
          <div className="card-title">{(client.first_name || '') + ' ' + (client.last_name || '') || 'Unnamed client'}</div>
          <div className="card-subtitle">{(client.company_name ? client.company_name + ' · ' : '') + (client.email || '—') + ' · ' + (client.phone || '—')}</div>
          <div className="text-sm text-muted" style={{ marginTop: '8px' }}>{[client.address, client.city, client.state, client.zip_code].filter(Boolean).join(', ') || 'No address'}</div>
          {client.property_sqft != null && Number(client.property_sqft) > 0 && <div className="text-sm text-muted">Property: {Number(client.property_sqft).toLocaleString()} sq ft</div>}
        </div>
        <div className="card">
          <div className="card-header">
            <div><div className="card-title">Quotes</div><div className="card-subtitle">{quotesForClient.length} for this client</div></div>
          </div>
          {quotesLoadError && <Alert type="warning">{quotesLoadError}</Alert>}
          {loadingQuotes ? <div style={{ padding: '24px', textAlign: 'center' }}><Spinner dark /></div> :
            quotesForClient.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">📋</div>
                <div className="empty-title">No quotes yet</div>
                <div className="empty-desc">Create a quote with AI in one click</div>
                <button className="btn btn-primary" onClick={() => { setShowNewQuoteModal(true); setQuoteError(''); }}>New Quote</button>
              </div>
            ) : (
              <div className="table-container">
                <table>
                  <thead><tr><th>Quote #</th><th>Status</th><th>Description</th><th>Total</th><th>Date</th><th></th></tr></thead>
                  <tbody>
                    {quotesForClient.map(q => (
                      <tr key={q.id}>
                        <td><span className="font-medium">{q.quote_number}</span></td>
                        <td><Badge status={q.status} /></td>
                        <td className="text-sm text-muted">{(q.description || '').slice(0, 50)}{(q.description || '').length > 50 ? '…' : ''}</td>
                        <td>${Number(q.total || 0).toFixed(2)}</td>
                        <td className="text-sm">{q.created_at ? new Date(q.created_at).toLocaleDateString() : '—'}</td>
                        <td><button className="btn btn-ghost btn-sm" onClick={() => openQuoteReview(q)}>View / Edit</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
        </div>

        {showNewQuoteModal && (
          <div className="modal-overlay" onClick={() => !generatingQuote && setShowNewQuoteModal(false)}>
            <div className="modal-panel" onClick={e => e.stopPropagation()}>
              <div className="modal-title">New quote — Generate with AI</div>
              {quoteError && <Alert type="error">{quoteError}</Alert>}
              <div className="form-group">
                <label className="form-label">Job description * ({VALID.quoteDescMin}–{VALID.quoteDescMax} characters)</label>
                <textarea className="form-input" rows={4} maxLength={VALID.quoteDescMax} value={newQuoteDesc} onChange={e => setNewQuoteDesc(e.target.value)} placeholder="e.g. Weekly lawn mowing, edging, and blow-off for front and back yard. Property ~5,000 sq ft." />
                <p className="text-sm text-muted">{(newQuoteDesc || '').length} / {VALID.quoteDescMax}</p>
              </div>
              <div className="form-group">
                <label className="form-label">Property sq ft (optional, 0–{VALID.propertySqftMax.toLocaleString()})</label>
                <input className="form-input" type="number" value={newQuoteSqft} onChange={e => setNewQuoteSqft(e.target.value)} placeholder="5000" min={0} max={VALID.propertySqftMax} />
              </div>
              <div className="modal-actions">
                <button className="btn btn-ghost" onClick={() => setShowNewQuoteModal(false)} disabled={generatingQuote}>Cancel</button>
                <button className="btn btn-primary" onClick={handleNewQuoteGenerate} disabled={generatingQuote || (newQuoteDesc || '').trim().length < VALID.quoteDescMin || (newQuoteDesc || '').trim().length > VALID.quoteDescMax}>
                  {generatingQuote ? <><Spinner /> Generating…</> : '✨ Generate with AI'}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ─── Clients List ───────────────────────────────────────────────────────────
  return (
    <div>
      <div className="card">
        <div className="card-header">
          <div>
            <div className="card-title">Clients</div>
            <div className="card-subtitle">{clients.length} total clients</div>
          </div>
          <div style={{display:'flex', gap:'10px'}}>
            <input className="form-input" style={{width:'220px'}} placeholder="🔍 Search clients..."
              value={search} onChange={e => setSearch(e.target.value)} />
            <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ Add Client</button>
          </div>
        </div>

        {showAdd && (
          <div style={{background:'var(--earth-50)', padding:'20px', borderRadius:'var(--radius)', marginBottom:'16px', border:'1px solid var(--earth-300)'}}>
            <h4 style={{marginBottom:'16px', fontWeight:'600'}}>New Client</h4>
            {error && <Alert type="error">{error}</Alert>}
            <div className="form-row">
              <div className="form-group"><label className="form-label">First Name *</label>
                <input className="form-input" value={form.first_name} onChange={e => setForm({...form, first_name: e.target.value})} maxLength={VALID.nameMax} placeholder="Jane" />
                <p style={{ color: 'var(--earth-500)', fontSize: '11px', marginTop: '2px' }}>Required, max {VALID.nameMax} characters</p></div>
              <div className="form-group"><label className="form-label">Last Name *</label>
                <input className="form-input" value={form.last_name} onChange={e => setForm({...form, last_name: e.target.value})} maxLength={VALID.nameMax} placeholder="Smith" />
                <p style={{ color: 'var(--earth-500)', fontSize: '11px', marginTop: '2px' }}>Required, max {VALID.nameMax} characters</p></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Email</label>
                <input className="form-input" type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="jane@example.com" />
                <p style={{ color: 'var(--earth-500)', fontSize: '11px', marginTop: '2px' }}>Optional. Valid email format.</p></div>
              <div className="form-group"><label className="form-label">Phone</label>
                <input className="form-input" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} placeholder="5551234567" />
                <p style={{ color: 'var(--earth-500)', fontSize: '11px', marginTop: '2px' }}>Optional. 10–15 digits if provided.</p></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Property Type</label>
                <select className="form-select" value={form.property_type} onChange={e => setForm({...form, property_type: e.target.value})}>
                  <option value="residential">Residential</option>
                  <option value="commercial">Commercial</option>
                </select></div>
              <div className="form-group"><label className="form-label">Property Sq Ft</label>
                <input className="form-input" type="number" value={form.property_sqft} onChange={e => setForm({...form, property_sqft: e.target.value})} placeholder="2500" min={1} max={999999} />
                <p style={{ color: 'var(--earth-500)', fontSize: '11px', marginTop: '2px' }}>Optional. 1–999,999 if provided.</p></div>
            </div>
            <div className="form-group"><label className="form-label">Address</label>
              <input className="form-input" value={form.address} onChange={e => setForm({...form, address: e.target.value})} placeholder="123 Main St" /></div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">City</label>
                <input className="form-input" value={form.city} onChange={e => setForm({...form, city: e.target.value})} /></div>
              <div className="form-group"><label className="form-label">State</label>
                <input className="form-input" value={form.state} onChange={e => setForm({...form, state: e.target.value})} /></div>
            </div>
            <div style={{display:'flex', gap:'10px', justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={() => { setShowAdd(false); setError(''); }}>Cancel</button>
              <button className="btn btn-primary" onClick={handleAdd} disabled={saving}>
                {saving ? <Spinner /> : 'Save Client'}
              </button>
            </div>
          </div>
        )}

        {loading ? <div style={{padding:'40px', textAlign:'center'}}><Spinner dark /></div> :
         filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">👥</div>
            <div className="empty-title">{search ? 'No clients found' : 'No clients yet'}</div>
            <div className="empty-desc">{search ? 'Try a different search' : 'Add your first client to get started'}</div>
            {!search && <button className="btn btn-primary" onClick={() => setShowAdd(true)}>Add Client</button>}
          </div>
         ) : (
          <div className="table-container">
            <table>
              <thead>
                <tr>
                  <th>Name</th><th>Contact</th><th>Type</th><th>Address</th><th>Sq Ft</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(c => (
                  <tr key={c.id} onClick={() => setSelectedClient(c)} style={{ cursor: 'pointer' }}>
                    <td><span style={{fontWeight:'500'}}>{c.first_name} {c.last_name}</span>
                      {c.company_name && <div style={{fontSize:'12px', color:'var(--earth-500)'}}>{c.company_name}</div>}</td>
                    <td><div style={{fontSize:'13px'}}>{c.email || '—'}</div>
                      <div style={{fontSize:'12px', color:'var(--earth-500)'}}>{c.phone || ''}</div></td>
                    <td><Badge status={c.property_type === 'commercial' ? 'admin' : 'laborer'} /></td>
                    <td style={{fontSize:'13px', color:'var(--earth-500)'}}>{[c.address, c.city, c.state].filter(Boolean).join(', ') || '—'}</td>
                    <td style={{fontSize:'13px'}}>{c.property_sqft ? c.property_sqft.toLocaleString() : '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
         )}
      </div>
    </div>
  );
}

// ─── Settings Page ────────────────────────────────────────────────────────────
function SettingsPage() {
  const api = useApi();
  const { updateTenant } = useAuth();
  const [tab, setTab] = useState('company');
  const [tenant, setTenant] = useState(null);
  const [taxRateInput, setTaxRateInput] = useState('');
  const [minQuoteInput, setMinQuoteInput] = useState('');
  const [users, setUsers] = useState([]);
  const [services, setServices] = useState([]);
  const [materials, setMaterials] = useState([]);
  const [laborRates, setLaborRates] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [success, setSuccess] = useState('');
  const [error, setError] = useState('');
  const [fieldErrors, setFieldErrors] = useState({ name: '', phone: '', email: '', address: '' });

  useEffect(() => {
    Promise.all([
      api('/tenant'),
      api('/users'),
      api('/catalog/services'),
      api('/catalog/materials'),
      api('/catalog/labor-rates'),
    ]).then(([t, u, sv, mt, lr]) => {
      setTenant(t); setTaxRateInput(formatTaxRateDisplay(t?.tax_rate)); setMinQuoteInput(formatMinimumQuoteDisplay(t?.minimum_quote) || '150'); setUsers(u); setServices(sv); setMaterials(mt); setLaborRates(lr);
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);

  const saveCompany = async () => {
    setError(''); setSuccess('');
    setFieldErrors({ name: '', phone: '', email: '', address: '' });
    const errs = { name: '', phone: '', email: '', address: '' };
    let hasError = false;

    const name = (tenant.name || '').trim();
    if (!name) {
      errs.name = 'Company name is required (1–255 characters).';
      hasError = true;
    } else if (name.length > VALID.companyNameMax) {
      errs.name = `Company name must be at most ${VALID.companyNameMax} characters.`;
      hasError = true;
    }

    const phone = (tenant.company_phone || '').trim();
    if (phone) {
      const p = validatePhone(phone);
      if (!p.ok) { errs.phone = p.msg; hasError = true; }
    }

    const email = (tenant.company_email || '').trim();
    if (email) {
      const emailRes = validateEmail(tenant.company_email, false);
      if (!emailRes.ok) { errs.email = emailRes.msg; hasError = true; }
    }

    const address = (tenant.company_address || '').trim();
    if (address && address.length > VALID.companyAddressMax) {
      errs.address = `Address must be at most ${VALID.companyAddressMax} characters.`;
      hasError = true;
    }

    if (hasError) {
      setFieldErrors(errs);
      setError(Object.values(errs).find(Boolean) || 'Please fix the errors below.');
      return;
    }

    const taxRes = parseTaxRatePercent(taxRateInput);
    if (!taxRes.ok) { setError(taxRes.msg); return; }
    const taxRate = taxRes.value;
    const minQuoteRes = parseMinimumQuote(minQuoteInput);
    if (!minQuoteRes.ok) { setError(minQuoteRes.msg); return; }
    const minQuote = minQuoteRes.value;
    setSaving(true);
    try {
      const updated = await api('/tenant', { method: 'PATCH', body: { name, company_phone: tenant.company_phone || undefined, company_email: tenant.company_email || undefined, company_address: tenant.company_address || undefined, timezone: tenant.timezone, tax_rate: taxRate, minimum_quote: minQuote } });
      setTenant(updated);
      setTaxRateInput(formatTaxRateDisplay(updated.tax_rate));
      setMinQuoteInput(formatMinimumQuoteDisplay(updated.minimum_quote) || '150');
      updateTenant(updated);
      setSuccess('Company settings saved.');
      setFieldErrors({ name: '', phone: '', email: '', address: '' });
    } catch (e) {
      setError(e.message || 'Could not save settings. Please try again.');
    }
    setSaving(false);
  };

  if (loading) return <div style={{padding:'40px',textAlign:'center'}}><Spinner dark /></div>;

  return (
    <div>
      <div className="tabs">
        {['company', 'users', 'catalog'].map(t => (
          <button key={t} className={`tab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
            {{ company:'🏢 Company', users:'👥 Users', catalog:'📦 Catalog' }[t]}
          </button>
        ))}
      </div>

      {success && <Alert type="success">{success}</Alert>}
      {error && <Alert type="error">{error}</Alert>}

      {tab === 'company' && tenant && (
        <div className="card">
          <div className="card-title" style={{marginBottom:'20px'}}>Company Settings</div>
          <div className="form-group"><label className="form-label">Company name *</label>
            <input className="form-input" value={tenant.name || ''} onChange={e => { setTenant({...tenant, name: e.target.value}); if (fieldErrors.name) setFieldErrors(prev => ({ ...prev, name: '' })); }} maxLength={VALID.companyNameMax} placeholder="Your Company LLC" aria-invalid={!!fieldErrors.name} />
            {fieldErrors.name && <p style={{ color: 'var(--red-500)', fontSize: '12px', marginTop: '4px' }}>⚠ {fieldErrors.name}</p>}
            {!fieldErrors.name && <p style={{ color: 'var(--earth-500)', fontSize: '12px', marginTop: '4px' }}>Required. 1–{VALID.companyNameMax} characters.</p>}
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Phone</label>
              <input className="form-input" value={tenant.company_phone || ''} onChange={e => { setTenant({...tenant, company_phone: e.target.value}); if (fieldErrors.phone) setFieldErrors(prev => ({ ...prev, phone: '' })); }} placeholder="5551234567" aria-invalid={!!fieldErrors.phone} />
              {fieldErrors.phone && <p style={{ color: 'var(--red-500)', fontSize: '12px', marginTop: '4px' }}>⚠ {fieldErrors.phone}</p>}
              {!fieldErrors.phone && <p style={{ color: 'var(--earth-500)', fontSize: '12px', marginTop: '4px' }}>Optional. 10–15 digits if provided.</p>}
            </div>
            <div className="form-group"><label className="form-label">Email</label>
              <input className="form-input" type="email" value={tenant.company_email || ''} onChange={e => { setTenant({...tenant, company_email: e.target.value}); if (fieldErrors.email) setFieldErrors(prev => ({ ...prev, email: '' })); }} placeholder="contact@company.com" aria-invalid={!!fieldErrors.email} />
              {fieldErrors.email && <p style={{ color: 'var(--red-500)', fontSize: '12px', marginTop: '4px' }}>⚠ {fieldErrors.email}</p>}
              {!fieldErrors.email && <p style={{ color: 'var(--earth-500)', fontSize: '12px', marginTop: '4px' }}>Optional. Valid email if provided.</p>}
            </div>
          </div>
          <div className="form-group"><label className="form-label">Address</label>
            <input className="form-input" value={tenant.company_address || ''} onChange={e => { setTenant({...tenant, company_address: e.target.value}); if (fieldErrors.address) setFieldErrors(prev => ({ ...prev, address: '' })); }} placeholder="123 Main St" maxLength={VALID.companyAddressMax} aria-invalid={!!fieldErrors.address} />
            {fieldErrors.address && <p style={{ color: 'var(--red-500)', fontSize: '12px', marginTop: '4px' }}>⚠ {fieldErrors.address}</p>}
            {!fieldErrors.address && <p style={{ color: 'var(--earth-500)', fontSize: '12px', marginTop: '4px' }}>Optional. Up to {VALID.companyAddressMax} characters.</p>}
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Tax rate (%)</label>
              <div style={{position:'relative'}}>
                <input className="form-input" type="text" inputMode="decimal" autoComplete="off"
                  placeholder="e.g. 8.25"
                  value={taxRateInput}
                  onChange={e => setTaxRateInput(e.target.value)} />
                <span style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',color:'var(--earth-500)',fontSize:'13px'}}>%</span>
              </div>
              <p style={{ color: 'var(--earth-500)', fontSize: '12px', marginTop: '4px' }}>0–100, up to 2 decimals (e.g. 8.25 for 8.25%).</p></div>
            <div className="form-group"><label className="form-label">Minimum quote ($)</label>
              <div style={{position:'relative'}}>
                <span style={{position:'absolute',left:'12px',top:'50%',transform:'translateY(-50%)',color:'var(--earth-500)',fontSize:'13px'}}>$</span>
                <input className="form-input" style={{paddingLeft:'24px'}} type="text" inputMode="decimal" autoComplete="off"
                  placeholder="e.g. 150 or 99.50"
                  value={minQuoteInput}
                  onChange={e => setMinQuoteInput(e.target.value)} />
              </div>
              <p style={{ color: 'var(--earth-500)', fontSize: '12px', marginTop: '4px' }}>$0–$500, up to 2 decimals (e.g. 150 or 99.50).</p></div>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-primary" onClick={saveCompany} disabled={saving}>{saving ? <Spinner /> : 'Save Changes'}</button>
          </div>
        </div>
      )}

      {tab === 'users' && (
        <div className="card">
          <div className="card-header">
            <div className="card-title">Team Members ({users.length})</div>
            <button className="btn btn-primary btn-sm">+ Invite User</button>
          </div>
          <div className="table-container">
            <table>
              <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th></tr></thead>
              <tbody>
                {users.map(u => (
                  <tr key={u.id}>
                    <td style={{fontWeight:'500'}}>{u.first_name} {u.last_name}</td>
                    <td style={{fontSize:'13px', color:'var(--earth-500)'}}>{u.email}</td>
                    <td><Badge status={u.role} /></td>
                    <td><Badge status={u.is_active ? 'active' : 'cancelled'} /></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab === 'catalog' && (
        <div style={{display:'flex', flexDirection:'column', gap:'16px'}}>
          <div className="card">
            <div className="card-header">
              <div className="card-title">Services ({services.length})</div>
              <button className="btn btn-primary btn-sm">+ Add Service</button>
            </div>
            {services.length === 0
              ? <div style={{color:'var(--earth-500)',fontSize:'14px',textAlign:'center',padding:'20px'}}>No services yet</div>
              : <div className="table-container"><table>
                  <thead><tr><th>Name</th><th>Category</th><th>Base Price</th><th>Unit</th></tr></thead>
                  <tbody>
                    {services.map(s => (
                      <tr key={s.id}>
                        <td style={{fontWeight:'500'}}>{s.name}</td>
                        <td style={{fontSize:'13px',color:'var(--earth-500)'}}>{s.category || '—'}</td>
                        <td>${parseFloat(s.base_price).toFixed(2)}</td>
                        <td style={{fontSize:'13px'}}>{s.unit}</td>
                      </tr>
                    ))}
                  </tbody>
                </table></div>}
          </div>
          <div className="card">
            <div className="card-header">
              <div className="card-title">Labor Rates ({laborRates.length})</div>
              <button className="btn btn-primary btn-sm">+ Add Rate</button>
            </div>
            {laborRates.length === 0
              ? <div style={{color:'var(--earth-500)',fontSize:'14px',textAlign:'center',padding:'20px'}}>No labor rates configured</div>
              : <div className="table-container"><table>
                  <thead><tr><th>Role</th><th>Property Type</th><th>Rate/Hour</th><th>OT Multiplier</th></tr></thead>
                  <tbody>
                    {laborRates.map(r => (
                      <tr key={r.id}>
                        <td style={{fontWeight:'500', textTransform:'capitalize'}}>{r.role.replace('_',' ')}</td>
                        <td style={{textTransform:'capitalize'}}>{r.property_type}</td>
                        <td>${parseFloat(r.rate_per_hour).toFixed(2)}/hr</td>
                        <td>{r.overtime_multiplier}×</td>
                      </tr>
                    ))}
                  </tbody>
                </table></div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Placeholder Pages ────────────────────────────────────────────────────────
function PlaceholderPage({ icon, title, desc, module }) {
  return (
    <div className="card" style={{textAlign:'center', padding:'60px 40px'}}>
      <div style={{fontSize:'56px', marginBottom:'16px'}}>{icon}</div>
      <h2 style={{fontFamily:'DM Serif Display', fontSize:'24px', marginBottom:'8px'}}>{title}</h2>
      <p style={{color:'var(--earth-500)', marginBottom:'24px', maxWidth:'400px', margin:'0 auto 24px'}}>{desc}</p>
      <span style={{display:'inline-flex', alignItems:'center', gap:'8px', padding:'8px 16px', background:'var(--earth-100)', borderRadius:'100px', fontSize:'13px', color:'var(--earth-500)'}}>
        🔨 Coming in {module}
      </span>
    </div>
  );
}

// ─── App Shell ────────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { id: 'dashboard', icon: '🏠', label: 'Dashboard' },
  { id: 'quotes', icon: '📋', label: 'Quotes', module: 'Module 1' },
  { id: 'clients', icon: '👥', label: 'Clients' },
  { id: 'schedule', icon: '📅', label: 'Schedule', module: 'Module 2' },
  { id: 'crews', icon: '👷', label: 'Crews', module: 'Module 2' },
  { id: 'settings', icon: '⚙️', label: 'Settings' },
];

function AppShell() {
  const { auth, logout } = useAuth();
  const [page, setPage] = useState('dashboard');
  const user = auth?.user || {};
  const tenant = auth?.tenant || {};

  const trialActive = tenant.status === 'trial';
  const trialEnds = tenant.trial_ends_at ? new Date(tenant.trial_ends_at) : null;
  const daysLeft = trialEnds ? Math.ceil((trialEnds - new Date()) / 86400000) : null;

  const initials = `${(user.first_name || '?')[0]}${(user.last_name || '?')[0]}`.toUpperCase();

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return <DashboardPage />;
      case 'clients': return <ClientsPage />;
      case 'settings': return <SettingsPage />;
      case 'quotes': return <PlaceholderPage icon="📋" title="AI Quoting Engine" desc="Generate professional quotes with AI in seconds — right from the job site. Upload photos, describe the work, and get an itemized quote instantly." module="Module 1" />;
      case 'schedule': return <PlaceholderPage icon="📅" title="Smart Scheduling" desc="Drag-and-drop crew scheduling with automatic route optimization to minimize drive time between jobs." module="Module 2" />;
      case 'crews': return <PlaceholderPage icon="👷" title="Crew Management" desc="Manage your crews, assign jobs, and track progress in real time." module="Module 2" />;
      default: return <DashboardPage />;
    }
  };

  const pageTitles = { dashboard:'Dashboard', quotes:'Quotes', clients:'Clients', schedule:'Schedule', crews:'Crews', settings:'Settings' };

  return (
    <div className="flex-col" style={{height:'100vh'}}>
      {trialActive && daysLeft !== null && daysLeft <= 10 && (
        <div className="trial-banner">
          <span>⏰ Your free trial ends in <strong>{daysLeft} day{daysLeft !== 1 ? 's' : ''}</strong>. Add a payment method to keep access.</span>
          <button className="btn btn-sm" style={{background:'#92400e', color:'white', border:'none'}}>Upgrade Now</button>
        </div>
      )}
      <div className="app-shell">
        <aside className="sidebar">
          <div className="sidebar-logo">
            <div className="logo-mark">
              <div className="logo-icon">🌿</div>
              <span className="logo-text">LandscapeOS</span>
            </div>
          </div>

          <div className="sidebar-tenant">
            <div className="tenant-name">{tenant.name || 'My Company'}</div>
            <div className="tenant-tier">{tenant.tier || 'starter'} · {tenant.status || 'trial'}</div>
          </div>

          <nav className="sidebar-nav">
            {NAV_ITEMS.map(item => (
              <button key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`}
                onClick={() => setPage(item.id)}>
                <span className="icon">{item.icon}</span>
                {item.label}
                {item.module && page !== item.id && (
                  <span style={{marginLeft:'auto', fontSize:'10px', background:'rgba(255,255,255,0.1)', padding:'2px 6px', borderRadius:'4px', color:'rgba(255,255,255,0.5)'}}>
                    {item.module}
                  </span>
                )}
              </button>
            ))}
          </nav>

          <div className="sidebar-footer">
            <div className="user-chip">
              <div className="avatar">{initials}</div>
              <div className="user-info">
                <div className="user-name">{user.first_name} {user.last_name}</div>
                <div className="user-role" style={{textTransform:'capitalize'}}>{(user.role || '').replace('_',' ')}</div>
              </div>
              <button className="logout-btn" onClick={logout} title="Sign out">⏏</button>
            </div>
          </div>
        </aside>

        <div className="main-content">
          <div className="topbar">
            <h1 className="page-title">{pageTitles[page] || page}</h1>
            <span className="topbar-company">{tenant.name || 'My Company'}</span>
          </div>
          <div className="page-body">{renderPage()}</div>
        </div>
      </div>
    </div>
  );
}

// ─── Routing (hash-based so URL reflects page and reload works) ───────────────
function getRoute() {
  const h = window.location.hash || '#/';
  return h.replace(/^#/, '') || '/';
}

function setRoute(path) {
  const hash = path.startsWith('/') ? '#' + path : '#' + '/' + path;
  if (window.location.hash !== hash) window.location.hash = hash;
}

// ─── Root App ────────────────────────────────────────────────────────────────
function isRootRoute(route) {
  return !route || route === '/' || route === '/login' || route === '/signup';
}

function App() {
  const { auth } = useAuth();
  const [view, setView] = useState(() => (getRoute() === '/signup' ? 'signup' : 'login'));
  const [route, setRouteState] = useState(getRoute);

  const atRoot = isRootRoute(route);
  const storedAuth = getStoredAuth();
  const authOrStored = auth || (atRoot ? null : storedAuth);

  // Keep route state in sync with hash so setting hash (e.g. after login) triggers re-render and correct screen
  React.useEffect(() => {
    const sync = () => setRouteState(getRoute());
    window.addEventListener('hashchange', sync);
    sync();
    return () => window.removeEventListener('hashchange', sync);
  }, []);

  // Sync login/signup view with hash only when still at a root route (avoid race when navigating to #/onboarding after login)
  React.useEffect(() => {
    if (!atRoot) return;
    const onHash = () => {
      const r = getRoute();
      if (isRootRoute(r)) setView(r === '/signup' ? 'signup' : 'login');
    };
    onHash();
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, [atRoot]);

  // At root: only set #/login or #/signup (never #/onboarding or #/dashboard) so bookmark to localhost:3000 shows login
  React.useEffect(() => {
    if (atRoot) {
      setRoute(view === 'signup' ? '/signup' : '/login');
    }
  }, [atRoot, view]);

  // Redirect when URL doesn't match auth state (do not redirect when at root)
  React.useEffect(() => {
    if (atRoot) return;
    if (!authOrStored) {
      setRoute('/login');
      return;
    }
    if (route !== '/onboarding' && route !== '/dashboard') {
      setRoute(authOrStored.onboarding_required ? '/onboarding' : '/dashboard');
      return;
    }
    if (route === '/onboarding' && !authOrStored.onboarding_required) {
      setRoute('/dashboard');
      return;
    }
    if (route === '/dashboard' && authOrStored.onboarding_required) {
      setRoute('/onboarding');
    }
  }, [atRoot, authOrStored, route, authOrStored?.onboarding_required]);

  // At root URL: always show login/signup, even if user has auth (so bookmark "localhost:3000" goes to login)
  if (atRoot) {
    return view === 'login'
      ? <LoginPage onSwitch={() => { setView('signup'); setRoute('/signup'); }} />
      : <SignupPage onSwitch={() => { setView('login'); setRoute('/login'); }} />;
  }

  // Not at root: require auth (use stored auth if context hasn't updated yet, e.g. right after login)
  if (!authOrStored) {
    return <LoginPage onSwitch={() => setRoute('/signup')} />;
  }

  const onboardingToken = getStoredToken() || (authOrStored && authOrStored.access_token);
  if (!onboardingToken || !String(onboardingToken).trim()) {
    return <LoginPage onSwitch={() => setRoute('/signup')} />;
  }

  const onboardingComplete = () => {
    const stored = sessionStorage.getItem('ls_auth');
    if (stored) {
      const data = JSON.parse(stored);
      data.onboarding_required = false;
      sessionStorage.setItem('ls_auth', JSON.stringify(data));
      setRoute('/dashboard');
      window.location.reload();
    }
  };

  if (route === '/onboarding') {
    return <OnboardingWizard token={onboardingToken} onComplete={onboardingComplete} />;
  }

  if (route === '/dashboard') {
    return <AppShell />;
  }

  return authOrStored.onboarding_required
    ? <OnboardingWizard token={onboardingToken} onComplete={onboardingComplete} />
    : <AppShell />;
}

function Root() {
  return (
    <AuthProvider>
      <App />
    </AuthProvider>
  );
}

ReactDOM.render(<Root />, document.getElementById('root'));
</script>
</body>
</html>
